name: Android CI

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17
          cache: gradle
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Retrieve version
        run: |
          COMMIT_HASH=$(echo "$GITHUB_SHA" | head -c 7)
          APP_VER_NAME=$(grep '^appVerName=' gradle.properties | cut -d'=' -f2)
          echo VERSION=${APP_VER_NAME}_${COMMIT_HASH} >> $GITHUB_ENV
      - name: Write key
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
            echo releaseStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo releaseKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo releaseKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo releaseStoreFile='${{ github.workspace }}/key.jks' >> gradle.properties
            echo ${{ secrets.KEY_STORE }} | base64 --decode > key.jks
          fi
      - name: Test compatibility resolvers
        run: bash ./gradlew testDebugUnitTest
      - name: Build with Gradle
        run: bash ./gradlew -PappVerName=${{ env.VERSION }} assembleRelease
      - name: Upload built apk
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Zhiliao_${{ env.VERSION }}
          path: ${{ github.workspace }}/app/build/outputs/apk/release
      - name: Send commit to telegram
        if: ${{ success() && github.event_name == 'push' && env.TELEGRAM_TO != '' && env.TELEGRAM_TOKEN != '' }}
        uses: appleboy/telegram-action@master
        env:
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        with:
          to: ${{ env.TELEGRAM_TO }}
          token: ${{ env.TELEGRAM_TOKEN }}
          format: markdown
          message: |+
            New push to github!
            *${{ github.event.head_commit.message }}* by ${{ github.event.head_commit.author.name }}
            See commit detail [here](${{ github.event.head_commit.url }})
            Snapshot apk is attached
          document: ${{ github.workspace }}/app/build/outputs/apk/release/Zhiliao_${{ env.VERSION }}.apk
